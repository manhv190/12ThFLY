<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

min-height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:radial-gradient(circle at center,#0b0f25,#000);

overflow:hidden;
color:white;

}

/* galaxy background */

.galaxy{

position:absolute;
width:200%;
height:200%;

background:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;

animation:galaxyMove 120s linear infinite;

opacity:0.35;

z-index:0;

}

@keyframes galaxyMove{

from{transform:translate(0,0)}
to{transform:translate(-500px,-500px)}

}

/* sao */

.star{

position:absolute;

width:3px;
height:3px;

background:white;

border-radius:50%;

animation:twinkle 2s infinite alternate;

z-index:1;

}

@keyframes twinkle{

from{opacity:0.2}
to{opacity:1}

}

/* cover */

.cover{

width:90%;
max-width:750px;

margin-bottom:45px;

z-index:2;

opacity:0;

animation:fadeIn 2s forwards;

transition:transform .6s;

}

.cover:hover{

transform:scale(1.05);

}

@keyframes fadeIn{

to{opacity:1}

}

/* button */

.open-btn{

padding:18px 60px;

font-size:22px;

border-radius:60px;

border:1px solid rgba(255,255,255,0.6);

background:rgba(255,255,255,0.1);

backdrop-filter:blur(10px);

color:white;

cursor:pointer;

letter-spacing:3px;

transition:0.3s;

box-shadow:
0 0 15px rgba(255,255,255,0.8),
0 0 40px rgba(120,180,255,1);

animation:glow 2s infinite;

z-index:2;

}

.open-btn:hover{

transform:scale(1.12);

}

@keyframes glow{

0%{
box-shadow:
0 0 8px rgba(255,255,255,0.5),
0 0 25px rgba(120,180,255,0.7);
}

50%{
box-shadow:
0 0 25px rgba(255,255,255,1),
0 0 60px rgba(120,180,255,1);
}

100%{
box-shadow:
0 0 8px rgba(255,255,255,0.5),
0 0 25px rgba(120,180,255,0.7);
}

}

/* explosion */

.spark{

position:absolute;

width:4px;
height:4px;

background:white;

border-radius:50%;

animation:spark 1s forwards;

z-index:3;

}

@keyframes spark{

from{
transform:translate(0,0);
opacity:1;
}

to{
transform:translate(var(--x),var(--y));
opacity:0;
}

}

</style>
</head>

<body>

<div class="galaxy"></div>

<img src="Cover.gif" class="cover">

<button class="open-btn" onclick="openCard()">OPEN</button>

<script>

/* tạo sao */

for(let i=0;i<120;i++){

let star=document.createElement("div")

star.className="star"

star.style.top=Math.random()*100+"%"
star.style.left=Math.random()*100+"%"

star.style.animationDuration=(Math.random()*3+1)+"s"

document.body.appendChild(star)

}

/* parallax sao */

document.addEventListener("mousemove",e=>{

let stars=document.querySelectorAll(".star")

stars.forEach((star,i)=>{

let speed=(i%5)/20

let x=(window.innerWidth/2-e.clientX)*speed
let y=(window.innerHeight/2-e.clientY)*speed

star.style.transform=`translate(${x}px,${y}px)`

})

})

/* hiệu ứng mở */

function openCard(){

for(let i=0;i<40;i++){

let spark=document.createElement("div")

spark.className="spark"

spark.style.left="50%"
spark.style.top="60%"

let x=(Math.random()*400-200)+"px"
let y=(Math.random()*400-200)+"px"

spark.style.setProperty("--x",x)
spark.style.setProperty("--y",y)

document.body.appendChild(spark)

}

setTimeout(()=>{

window.location.href="card.html"

},700)

}

</script>

</body>
</html>
